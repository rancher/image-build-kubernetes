name: Sync Upstream
run-name: Upstream Sync
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
    contents: write
    id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: "Read Secrets"
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/rancher-release-team-auto-tagger/app-credentials appId | APP_ID ;
            secret/data/github/repo/${{ github.repository }}/github/rancher-release-team-auto-tagger/app-credentials privateKey | PRIVATE_KEY

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}

      - name: Sync Kubernetes Release
        uses: rancher/ecm-distro-tools/actions/sync-upstream-release@eb9f1b8024d407105b1f2d90e2ceca27a950f921 # v0.67.4
        with:
          upstream-owner: 'kubernetes'
          upstream-repo: 'kubernetes'
          image-build-owner: ${{ github.repository_owner }}
          image-build-repo: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
